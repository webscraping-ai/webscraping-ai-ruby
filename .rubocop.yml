require:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "pkg/**/*"

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: false

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 25

Metrics/ClassLength:
  Max: 200

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/webscraping_ai/client.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "lib/webscraping_ai/client.rb"

Naming/VariableNumber:
  # `error_on_404` mirrors the upstream WebScraping.AI API parameter name.
  Enabled: false

RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 5

RSpec/NestedGroups:
  Max: 4

RSpec/SpecFilePathFormat:
  # The gem is named `webscraping_ai` (single word), not `web_scraping_ai`.
  Enabled: false

RSpec/NoExpectationExample:
  # WebMock raises if a `.with(query: ...)` stub is not matched, so request-shape
  # specs that rely on stub matching are implicitly asserting.
  Exclude:
    - "spec/webscraping_ai/client_spec.rb"
